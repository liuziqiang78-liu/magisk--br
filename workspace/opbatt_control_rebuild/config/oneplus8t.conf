# 一加8T (KB2000) 电池控制配置文件
# 基于 DTS 文件 dtb.12.dts 分析生成

[battery]
# 电池基本参数
capacity_mah = 4500
max_voltage_mv = 4380
max_current_ma = 3000
dual_cell = true
battery_type = "alium_860_89032_0000_3600mah_sept24th2018"
batt_id_kohm = 107

[temperature]
# 温度阈值 (单位: 0.1°C)
cold_threshold = 200
cool_threshold = 500
normal_threshold = 1600
warm_threshold = 4500
hot_threshold = 5000
removed_threshold = 1900

# 温度对应的充电电流 (单位: mA)
temp_cold_fastchg_current = 500
temp_little_cold_fastchg_current = 950
temp_cool_fastchg_current_high = 1100
temp_cool_fastchg_current_low = 1100
temp_little_cool_fastchg_current = 1100
temp_normal_fastchg_current = 1100
temp_warm_fastchg_current = 600
temp_warm_fastchg_current_led_on = 250
temp_hot_fastchg_current = 512

# 温度对应的浮充电压 (单位: mV)
temp_cold_vfloat = 3980
temp_little_cold_vfloat = 4435
temp_cool_vfloat = 4435
temp_little_cool_vfloat = 4435
temp_normal_vfloat = 4435
temp_warm_vfloat = 4130
temp_hot_vfloat = 3980

[charging]
# 充电基本参数
auto_recharge_soc = 98
iterm_ma = 115
recharge_mv = 100
max_chg_time_sec = 36000
vfloat_step_mv = 8

# 电压阈值
vbatt_full_thr = 4435
vbatt_hv_thr = 4600
vbatt_power_off = 3250
vbatt_soc_1 = 3300

# 充电器阈值
charger_hv_thr = 9900
charger_recv_thr = 9468
charger_lv_thr = 3400

# 输入电流限制 (单位: mA)
input_current_charger = 2000
input_current_pd = 3000
input_current_qc = 2000
input_current_usb = 500
input_current_cdp = 1500
input_current_led = 1200
input_current_led_high = 1800
input_current_led_warm = 1800
input_current_led_normal = 2000
input_current_camera = 1200
input_current_calling = 1500

[vooc]
# VOOC 快充配置
enabled = true
max_current_ma = 3600
normal_temp = 3500
warm_temp = 3700
hot_temp = 4400
project = 3

# VOOC 输入电流 (单位: mA)
input_current_normal = 3600
input_current_warm = 3200
input_current_high = 2200
charger_current_normal = 1800

# VOOC LED 输入电流 (单位: mA)
input_current_led_high = 1800
input_current_led_warm = 1800
input_current_led_normal = 3600

# VOOC 温度阈值
overtemp_bat = 3500
led_warm_bat = 3700
led_high_bat = 3700

# VOOC 策略
strategy_normal_current = 6
strategy_normal_to_little_cool_current = 5
batt_over_high_temp = 4400
batt_over_low_temp = 450
over_high_or_low_current = 0

[ufcs]
# UFCS 快充配置
enabled = true
max_current_ma = 3000
max_voltage_mv = 4380
detection = 8

[pps]
# PPS 快充配置
enabled = true
max_current_ma = 3000
max_voltage_mv = 4380
detection = 8

# PPS 温度对应的快充电流 (单位: mA)
pd_temp_little_cold_fastchg_current_high = 2000
pd_temp_little_cold_fastchg_current_low = 1000
pd_temp_cool_fastchg_current_high = 2000
pd_temp_cool_fastchg_current_low = 1000
pd_temp_little_cool_fastchg_current = 3000
pd_temp_normal_fastchg_current = 3000
pd_temp_warm_fastchg_current = 600

[qc]
# QC 快充配置
enabled = false
max_current_ma = 2000
max_voltage_mv = 4380

# QC 温度对应的快充电流 (单位: mA)
qc_temp_little_cold_fastchg_current_high = 2000
qc_temp_little_cold_fastchg_current_low = 1000
qc_temp_cool_fastchg_current_high = 2000
qc_temp_cool_fastchg_current_low = 1000
qc_temp_little_cool_fastchg_current = 2000
qc_temp_normal_fastchg_current = 2000
qc_temp_warm_fastchg_current = 600

[ffc]
# FFC (Flash Charge) 配置
enabled = true
ff1_normal_fastchg_ma = 550
ff1_warm_fastchg_ma = 550
ffc2_normal_fastchg_ma = 350
ffc2_warm_fastchg_ma = 350
ffc2_temp_warm = 3500
ffc2_temp_high = 4000
ffc2_temp_low = 1200
ff1_exit_step_ma = 150
ff1_warm_exit_step_ma = 150
ffc2_exit_step_ma = 150

# FFC 浮充电压 (单位: mV)
ffc_temp_normal_vfloat = 4500
ffc1_temp_normal_vfloat = 4500
ffc2_temp_normal_vfloat = 4500

[step_charging]
# 步进充电配置
enabled = true
step1_voltage_start = 3600000
step1_voltage_end = 3750000
step1_current = 5400000
step2_voltage_start = 3750001
step2_voltage_end = 4280000
step2_current = 3600000
step3_voltage_start = 4280001
step3_voltage_end = 4380000
step3_current = 2500000

[jeita]
# JEITA 温度补偿配置
enabled = true
hard_threshold_low = 22733
hard_threshold_high = 8376
soft_threshold_low = 19660
soft_threshold_high = 9707
soft_hys_threshold_low = 18644
soft_hys_threshold_high = 10563

# JEITA FCC 范围 (单位: µA)
jeita_fcc_range1_temp_start = 0
jeita_fcc_range1_temp_end = 100
jeita_fcc_range1_fcc = 2500000
jeita_fcc_range2_temp_start = 101
jeita_fcc_range2_temp_end = 400
jeita_fcc_range2_fcc = 3600000
jeita_fcc_range3_temp_start = 401
jeita_fcc_range3_temp_end = 450
jeita_fcc_range3_fcc = 2500000

# JEITA FV 范围 (单位: µV)
jeita_fv_range1_temp_start = 0
jeita_fv_range1_temp_end = 100
jeita_fv_range1_fv = 4250000
jeita_fv_range2_temp_start = 101
jeita_fv_range2_temp_end = 400
jeita_fv_range2_fv = 4380000
jeita_fv_range3_temp_start = 401
jeita_fv_range3_temp_end = 450
jeita_fv_range3_fv = 4250000

[thermal_mitigation]
# 热缓解配置 (单位: µA)
mitigation_level0 = 3000000
mitigation_level1 = 1500000
mitigation_level2 = 1000000
mitigation_level3 = 500000

[control]
# 充电控制选项
chg_ctrl_by_calling = true
chg_ctrl_by_lcd = true
chg_ctrl_by_vooc = true
chg_ctrl_by_camera = true
check_batt_full_by_sw = true
sw_vfloat_over_protect_enable = true
skip_usbtemp_cool_down = true
support_abnormal_adapter = true

# 其他选项
hold_soc_while_full = true
linearize_soc = true
soc_scale_mode_en = true
force_calib_level = 130

[sysfs]
# sysfs 路径配置
battery_status_path = "/sys/class/power_supply/battery/status"
battery_capacity_path = "/sys/class/power_supply/battery/capacity"
battery_voltage_path = "/sys/class/power_supply/battery/voltage_now"
battery_current_path = "/sys/class/power_supply/battery/current_now"
battery_temp_path = "/sys/class/oplus_chg/battery/temp"
battery_qmax_path = "/sys/class/oplus_chg/battery/qmax"
battery_cycle_count_path = "/sys/class/oplus_chg/battery/cycle_count"
battery_life_path = "/sys/class/oplus_chg/battery/battery_life"
battery_manu_date_path = "/sys/class/oplus_chg/battery/manu_date"
battery_type_path = "/sys/class/oplus_chg/battery/battery_type"
cell_voltage_path = "/sys/class/oplus_chg/battery/cell_voltage"
voltage_diff_path = "/sys/class/oplus_chg/battery/voltage_diff"
shell_temp_path = "/sys/class/oplus_chg/battery/shell_temp"
charge_type_path = "/sys/class/oplus_chg/battery/battery_log_content"
usb_voltage_path = "/sys/class/power_supply/usb/voltage_now"
usb_current_path = "/sys/class/power_supply/usb/current_max"
usb_online_path = "/sys/class/power_supply/usb/online"
usb_present_path = "/sys/class/power_supply/usb/present"

[logging]
# 日志配置
log_level = 2
log_file = "/data/opbatt/opbatt_control.log"
log_max_size = 5242880
log_max_files = 5

[daemon]
# 守护进程配置
enabled = true
pid_file = "/data/opbatt/opbatt_control.pid"
check_interval = 1
auto_restart = true
max_restart_count = 10
restart_delay = 5
